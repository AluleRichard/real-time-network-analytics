<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Performance Analytics Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }

        body.light {
            background: #f8fafc;
            color: #1e2937;
        }

        h1 {
            text-align: center;
            color: #60a5fa;
        }

        .light h1 {
            color: #1e40af;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #1e2937;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
        }

        .light .card {
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .gauge-container {
            height: 280px;
        }

        .status {
            text-align: center;
            font-size: 1.1em;
            margin: 10px 0;
        }

        .live-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .history {
            height: 400px;
        }

        button {
            padding: 10px 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🌐 Real-Time Network Performance Analytics Dashboard</h1>
        <div class="status">
            <span class="live-dot"></span> Live • Connected • Updating every 30s
            <button onclick="toggleTheme()">🌙 Toggle Theme</button>
            <button onclick="exportData()">📥 Export Data</button>
        </div>

        <div class="grid">
            <!-- Existing 4 gauges remain the same (Download, Upload, Ping, Packet Loss) -->
            <!-- ... (keep your previous gauge cards) ... -->

            <!-- New Traffic Volume Card -->
            <div class="card">
                <h2>Total Traffic Volume</h2>
                <div id="trafficCard" style="font-size: 2.5em; text-align: center; padding: 40px 0; color: #60a5fa;">
                    0.00 GB
                </div>
                <p style="text-align:center; color:#94a3b8;">Sent + Received</p>
            </div>
        </div>

        <!-- Trend Charts (keep as before) -->
        <div class="card history">
            <h2>Performance Trends</h2>
            <div id="trendChart" style="height: 350px;"></div>
        </div>
    </div>

    <script>
        // ... (keep all your existing gauge and chart initialization code) ...

        let isDark = true;

        function toggleTheme() {
            isDark = !isDark;
            document.body.classList.toggle('light', !isDark);
        }

        function exportData() {
            const dataStr = JSON.stringify(historyData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `network-metrics-${new Date().toISOString().slice(0, 10)}.json`;
            link.click();
        }

        // Update traffic volume (add this inside your updateDashboard function)
        // After updating gauges, add:
        // const totalBytes = (data.bytes_sent || 0) + (data.bytes_recv || 0);
        // const totalGB = (totalBytes / (1024**3)).toFixed(2);
        // document.getElementById('trafficCard').textContent = totalGB + ' GB';
    </script>
</body>

</html>
